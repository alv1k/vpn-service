<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIIN VPN Admin</title>
<style>
:root{--bg:#0a0a0a;--card:#161616;--border:#2a2a2a;--text:#e0e0e0;--muted:#888;--accent:#7c3aed;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--accent);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:12px}
/* Nav */
nav{display:flex;gap:4px;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px;flex-wrap:wrap}
nav button{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
nav button:hover{border-color:var(--accent)}
.title{font-size:18px;font-weight:700;margin-right:auto;padding:8px 0;color:var(--text)}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.card h3{font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.card .val{font-size:24px;font-weight:700}
.card .sub{font-size:12px;color:var(--muted);margin-top:4px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.dot.on{background:var(--green)}.dot.off{background:var(--red)}
/* Pulsing dot */
.pulse-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#008771;position:relative;margin-right:6px;vertical-align:middle}
.pulse-dot::before{content:'';position:absolute;top:-3px;left:-3px;width:16px;height:16px;border-radius:50%;background:rgba(0,135,113,.4);animation:pulse-ring 1.5s ease-out infinite}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.6);opacity:0}}
/* Tables */
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{background:#1a1a1a;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
tr:hover{background:#1e1e1e}
/* Buttons */
.btn{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text);cursor:pointer;font-size:12px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:2px 6px;font-size:11px}
.btn.green{border-color:var(--green);color:var(--green)}.btn.red{border-color:var(--red);color:var(--red)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
/* Toggle */
.toggle{cursor:pointer;font-size:18px}
/* Input */
input[type=text],input[type=search]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;width:100%;max-width:300px}
input:focus{outline:none;border-color:var(--accent)}
/* Modal */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:300px;max-width:90vw;max-height:80vh;overflow:auto}
.modal h2{margin-bottom:12px;font-size:16px}
.modal pre{background:var(--bg);padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;max-height:400px;white-space:pre-wrap;word-break:break-all}
/* Section */
.section{display:none}.section.active{display:block}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge.on{background:#22c55e22;color:var(--green)}.badge.off{background:#ef444422;color:var(--red)}
.badge.paid{background:#22c55e22;color:var(--green)}.badge.pending{background:#f59e0b22;color:var(--orange)}
.mono{font-family:monospace;font-size:12px}
.trunc{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.mt{margin-top:12px}.mb{margin-bottom:12px}
.sub-table{margin-top:8px;font-size:12px}
.sub-table td{padding:4px 8px;border:none;border-bottom:1px solid #222}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr}th,td{padding:4px 6px;font-size:12px}}
</style>
</head>
<body>
<div class="container">
<nav>
  <span class="title">TIIN VPN</span>
  <button onclick="showTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
  <button onclick="showTab('awg')" id="tab-awg">AWG</button>
  <button onclick="showTab('vless')" id="tab-vless">VLESS</button>
  <button onclick="showTab('users')" id="tab-users">Users</button>
  <a href="https://344988.snk.wtf:2096/panel-3x-ui/" target="_blank" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--muted);display:inline-flex;align-items:center">3X-UI Panel ↗</a>
</nav>

<!-- Dashboard -->
<div id="s-dashboard" class="section active">
  <div class="cards" id="dash-cards"></div>
  <h3 class="mb" style="color:var(--muted)">ONLINE NOW <span id="online-count" style="color:var(--green)"></span></h3>
  <table class="mb"><thead><tr><th>Type</th><th>Name</th><th>IP</th><th>Last Seen</th></tr></thead>
  <tbody id="dash-online"></tbody></table>
  <h3 class="mb" style="color:var(--muted)">FINANCIALS</h3>
  <div class="cards" id="dash-finance"></div>
  <div id="dash-monthly" class="mb"></div>
</div>

<!-- AWG -->
<div id="s-awg" class="section">
  <div class="cards" id="awg-params"></div>
  <div class="toolbar">
    <b>Clients</b>
    <button class="btn primary" onclick="awgCreatePrompt()">+ Add Client</button>
    <span style="flex:1"></span>
    <button class="btn" onclick="loadAWG()">Refresh</button>
  </div>
  <table><thead><tr><th>Name</th><th>Address</th><th>Enabled</th><th>Created</th><th>Actions</th></tr></thead>
  <tbody id="awg-clients"></tbody></table>
</div>

<!-- VLESS -->
<div id="s-vless" class="section">
  <div class="toolbar">
    <b>Inbounds</b>
    <select id="vless-ib-select" onchange="loadVlessClients()" style="background:var(--card);color:var(--text);border:1px solid var(--border);padding:6px;border-radius:4px"></select>
    <span style="flex:1"></span>
    <button class="btn" onclick="loadVLESS()">Refresh</button>
  </div>
  <div class="cards mb" id="vless-ib-info"></div>
  <table><thead><tr><th>Email</th><th>UUID</th><th>Upload</th><th>Download</th><th>Expiry</th><th>Last Online</th><th>On</th></tr></thead>
  <tbody id="vless-clients"></tbody></table>
</div>

<!-- Users -->
<div id="s-users" class="section">
  <div class="toolbar">
    <input type="search" id="user-search" placeholder="Search by tg_id or name..." onkeyup="debounce(loadUsers,400)()">
    <button class="btn" onclick="loadUsers()">Search</button>
  </div>
  <table><thead><tr><th>TG ID</th><th>Name</th><th>Subscription</th><th>Status</th><th>Discount</th><th>Referrals</th><th></th></tr></thead>
  <tbody id="users-list"></tbody></table>
</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const B = '/tiin_admin_panel';
let _cookie = false;
let _vlessInbounds = [];
let _debounceTimers = {};

function debounce(fn, ms) {
  return function(...args) {
    clearTimeout(_debounceTimers[fn.name]);
    _debounceTimers[fn.name] = setTimeout(() => fn(...args), ms);
  };
}

async function api(path, opts = {}) {
  if (!_cookie) {
    await fetch(`${B}/api/session`, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: AWG_PASS}), credentials:'same-origin'});
    _cookie = true;
  }
  opts.credentials = 'same-origin';
  const r = await fetch(`${B}${path}`, opts);
  if (path.includes('configuration')) return r.text();
  if (r.status === 204) return null;
  return r.json();
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id==='dashboard') { loadDashboard(); startOnlinePolling(); }
  else { stopOnlinePolling(); }
  if (id==='awg') loadAWG();
  if (id==='vless') loadVLESS();
  if (id==='users') loadUsers();
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' +
         d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

// ── Online refresh ──
let _onlineInterval = null;

async function refreshOnline() {
  try {
    const online = await api('/api/admin/online');
    document.getElementById('online-count').textContent = `(${online.length})`;
    document.getElementById('dash-online').innerHTML = online.length ? online.map(u => `<tr>
      <td><span class="pulse-dot"></span><span class="badge ${u.type==='vless'?'on':'paid'}">${u.type.toUpperCase()}</span></td>
      <td>${u.name}</td>
      <td class="mono">${u.ip}</td>
      <td>${u.last_seen} UTC</td></tr>`).join('') :
      '<tr><td colspan="4" style="color:var(--muted);text-align:center">No active connections</td></tr>';
  } catch(e) { console.warn('online refresh error', e); }
}

function startOnlinePolling() {
  if (_onlineInterval) clearInterval(_onlineInterval);
  _onlineInterval = setInterval(refreshOnline, 5000);
}

function stopOnlinePolling() {
  if (_onlineInterval) { clearInterval(_onlineInterval); _onlineInterval = null; }
}

// ── Dashboard ──
async function loadDashboard() {
  const d = await api('/api/admin/dashboard');
  document.getElementById('dash-cards').innerHTML = `
    <div class="card"><h3>AWG Clients</h3><div class="val">${d.awg.clients_enabled}/${d.awg.clients_total}</div>
      <div class="sub"><span class="dot ${d.awg.interface_up?'on':'off'}"></span>awg0 ${d.awg.interface_up?'UP':'DOWN'}</div></div>
    <div class="card"><h3>VLESS Clients</h3><div class="val">${d.xui.clients}</div>
      <div class="sub"><span class="dot ${d.xui.xray_running?'on':'off'}"></span>xray ${d.xui.xray_running?'UP':'DOWN'}</div>
      <div class="sub">↑${d.xui.traffic_up_fmt} ↓${d.xui.traffic_down_fmt}</div></div>
    <div class="card"><h3>Users</h3><div class="val">${d.users.total}</div>
      <div class="sub">${d.users.active_subscribers} active subs</div></div>
    <div class="card"><h3>Revenue</h3><div class="val">${d.payments.revenue.toLocaleString()} ₽</div>
      <div class="sub">${d.payments.paid} paid / ${d.payments.total} total</div></div>`;

  // Online users
  await refreshOnline();

  // Finance
  const fin = await api('/api/admin/finance');
  const profitColor = fin.profit >= 0 ? 'var(--green)' : 'var(--red)';
  const monthlyProfitColor = fin.monthly_profit >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('dash-finance').innerHTML = `
    <div class="card"><h3>Total Revenue</h3><div class="val">${fin.total_revenue.toLocaleString()} ₽</div>
      <div class="sub">${fin.days_running} дней работы</div></div>
    <div class="card"><h3>Server Cost</h3><div class="val">${fin.server_monthly_cost.toLocaleString()} ₽/мес</div>
      <div class="sub">Итого: ${fin.total_cost.toLocaleString()} ₽</div></div>
    <div class="card"><h3>Profit</h3><div class="val" style="color:${profitColor}">${fin.profit >= 0 ? '+' : ''}${fin.profit.toLocaleString()} ₽</div>
      <div class="sub">ROI: ${fin.roi_percent}%</div></div>
    <div class="card"><h3>Monthly Avg</h3><div class="val">${fin.avg_monthly_revenue.toLocaleString()} ₽</div>
      <div class="sub" style="color:${monthlyProfitColor}">Прибыль: ${fin.monthly_profit >= 0 ? '+' : ''}${fin.monthly_profit.toLocaleString()} ₽/мес</div></div>`;

  // Monthly breakdown
  if (fin.monthly.length) {
    let mhtml = '<table><thead><tr><th>Month</th><th>Payments</th><th>Revenue</th></tr></thead><tbody>';
    fin.monthly.forEach(m => {
      mhtml += '<tr><td>' + m.month + '</td><td>' + m.payments + '</td><td>' + m.revenue.toLocaleString() + ' ₽</td></tr>';
    });
    mhtml += '</tbody></table>';
    document.getElementById('dash-monthly').innerHTML = mhtml;
  }
}

// ── AWG ──
async function loadAWG() {
  const [srv, clients] = await Promise.all([api('/api/admin/awg/server'), api('/api/wireguard/client')]);
  document.getElementById('awg-params').innerHTML = `
    <div class="card"><h3>Port</h3><div class="val">${srv.listen_port}</div></div>
    <div class="card"><h3>Jc / Jmin-Jmax</h3><div class="val">${srv.jc} / ${srv.jmin}-${srv.jmax}</div></div>
    <div class="card"><h3>S1-S4</h3><div class="val mono">${srv.s1} ${srv.s2} ${srv.s3} ${srv.s4}</div></div>
    <div class="card"><h3>I1 (CPS)</h3><div class="val mono" style="font-size:14px">${srv.i1||'none'}</div></div>`;

  document.getElementById('awg-clients').innerHTML = clients.map(c => `<tr>
    <td>${c.name}</td><td class="mono">${c.address}</td>
    <td><span class="toggle" onclick="awgToggle('${c.id}',${!c.enabled})">${c.enabled?'🟢':'🔴'}</span></td>
    <td>${fmtDate(c.createdAt)}</td>
    <td>
      <button class="btn sm" onclick="awgConfig('${c.id}')">Conf</button>
      <button class="btn sm" onclick="awgQR('${c.id}')">QR</button>
      <button class="btn sm red" onclick="awgDelete('${c.id}','${c.name}')">Del</button>
    </td></tr>`).join('');
}

async function awgCreatePrompt() {
  const name = prompt('Client name:');
  if (!name) return;
  await api('/api/wireguard/client', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
  loadAWG();
}
async function awgToggle(id, enable) {
  await api(`/api/wireguard/client/${id}/${enable?'enable':'disable'}`, {method:'POST'});
  loadAWG();
}
async function awgDelete(id, name) {
  if (!confirm(`Delete ${name}?`)) return;
  await api(`/api/wireguard/client/${id}`, {method:'DELETE'});
  loadAWG();
}
async function awgConfig(id) {
  const conf = await api(`/api/wireguard/client/${id}/configuration`);
  openModal(`<h2>Client Config</h2><pre>${conf}</pre>
    <button class="btn mt" onclick="navigator.clipboard.writeText(document.querySelector('.modal pre').textContent);this.textContent='Copied!'">Copy</button>
    <button class="btn mt" onclick="closeModal()">Close</button>`);
}
async function awgQR(id) {
  openModal(`<h2>QR Code</h2><img src="${B}/api/wireguard/client/${id}/qrcode.svg" style="width:300px;background:#fff;border-radius:8px">
    <br><button class="btn mt" onclick="closeModal()">Close</button>`);
}

// ── VLESS ──
async function loadVLESS() {
  _vlessInbounds = await api('/api/admin/xui/inbounds');
  const sel = document.getElementById('vless-ib-select');
  // Find first enabled inbound to select by default
  const defaultIb = _vlessInbounds.find(ib => ib.enable) || _vlessInbounds[0];
  sel.innerHTML = _vlessInbounds.map(ib =>
    `<option value="${ib.id}" ${defaultIb && ib.id === defaultIb.id ? 'selected' : ''}>${ib.remark} (:${ib.port}) [${ib.protocol}] ${ib.enable?'':'⛔'}</option>`).join('');
  loadVlessClients();
}

async function loadVlessClients() {
  const ibId = document.getElementById('vless-ib-select').value;
  if (!ibId) return;
  const ib = _vlessInbounds.find(i => i.id == ibId);
  document.getElementById('vless-ib-info').innerHTML = ib ? `
    <div class="card"><h3>${ib.remark}</h3>
      <div class="sub">${ib.protocol} / ${ib.network} / ${ib.security}</div>
      <div class="sub">↑${ib.traffic_up_fmt} ↓${ib.traffic_down_fmt}</div>
      <div class="sub"><span class="badge ${ib.enable?'on':'off'}">${ib.enable?'active':'disabled'}</span> ${ib.client_count} clients</div>
    </div>` : '';

  const clients = await api(`/api/admin/xui/inbounds/${ibId}/clients`);
  document.getElementById('vless-clients').innerHTML = clients.map(c => `<tr>
    <td>${c.email}</td>
    <td class="mono"><span class="trunc" title="${c.uuid}">${c.uuid.slice(0,8)}…</span></td>
    <td>${c.up_fmt}</td><td>${c.down_fmt}</td>
    <td>${c.expiry||'∞'}</td>
    <td>${c.last_online||'—'}</td>
    <td>${c.enable?'🟢':'🔴'}</td></tr>`).join('');
}

// ── Users ──
async function loadUsers() {
  const q = document.getElementById('user-search')?.value || '';
  const users = await api(`/api/admin/users?search=${encodeURIComponent(q)}`);
  document.getElementById('users-list').innerHTML = users.map(u => {
    const sub = u.subscription_until;
    const active = sub && new Date(sub) > new Date();
    return `<tr>
      <td class="mono">${u.tg_id}</td>
      <td>${u.first_name||''} ${u.last_name||''}</td>
      <td>${sub?fmtDate(sub):'—'}</td>
      <td><span class="badge ${active?'on':'off'}">${active?'active':'expired'}</span></td>
      <td>${u.permanent_discount?u.permanent_discount+'%':'—'}</td>
      <td>${u.referral_count||0}</td>
      <td><button class="btn sm" onclick="showUserDetail(${u.tg_id})">Details</button></td></tr>`;
  }).join('');
}

async function showUserDetail(tgId) {
  const [keys, payments] = await Promise.all([
    api(`/api/admin/users/${tgId}/keys`),
    api(`/api/admin/users/${tgId}/payments`)
  ]);
  let html = `<h2>User ${tgId}</h2>`;
  html += `<h3 class="mt mb" style="color:var(--muted)">VPN KEYS (${keys.length})</h3>`;
  if (keys.length) {
    html += `<table class="sub-table"><tr><th>Type</th><th>Name</th><th>Expires</th></tr>`;
    keys.forEach(k => html += `<tr><td><span class="badge ${k.vpn_type==='vless'?'on':'paid'}">${k.vpn_type}</span></td>
      <td class="mono">${k.client_name||''}</td><td>${fmtDate(k.expires_at)}</td></tr>`);
    html += `</table>`;
  }
  html += `<h3 class="mt mb" style="color:var(--muted)">PAYMENTS (${payments.length})</h3>`;
  if (payments.length) {
    html += `<table class="sub-table"><tr><th>Date</th><th>Tariff</th><th>Amount</th><th>Status</th></tr>`;
    payments.forEach(p => html += `<tr><td>${fmtDate(p.created_at)}</td><td>${p.tariff||''}</td>
      <td>${p.amount} ₽</td><td><span class="badge ${p.status==='paid'?'paid':'pending'}">${p.status}</span></td></tr>`);
    html += `</table>`;
  }
  html += `<button class="btn mt" onclick="closeModal()">Close</button>`;
  openModal(html);
}

// Init
const AWG_PASS = '{{AWG_PASSWORD}}';
loadDashboard();
startOnlinePolling();
</script>
</body>
</html>
